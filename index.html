<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rhythm Reaction Trainer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23007aff'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='%23fff'%3ER%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main id="app">
    <header>
      <h1>Rhythm Reaction Trainer</h1>
      <div id="header-controls">
        <button id="login-btn">Log in</button>
        <button id="signup-btn">Sign Up</button>
        <button id="settings-btn" aria-label="Settings">⚙️</button>
      </div>
    </header>

    <section id="controls">
      <div id="mode-select">
        <button id="btn-beat" class="mode-btn active">Beat-Click Trainer</button>
        <button id="btn-key" class="mode-btn">Key Press Trainer</button>
        <button id="btn-pattern" class="mode-btn">Pattern Memory Trainer</button>
      </div>
      <div id="profile">
        <select id="difficulty" aria-label="Difficulty">
          <option value="noob">Noob</option>
          <option value="ez">EZ</option>
          <option value="veteran">Veteran</option>
          <option value="experienced">Experienced</option>
          <option value="expert">Expert</option>
          <option value="pro">Pro</option>
        </select>
        <button id="start-btn">Start</button>
      </div>
    </section>

    <div id="profile-info" aria-live="polite"></div>

    <div id="game-container">
      <canvas id="game-canvas" width="800" height="500" aria-label="Game canvas"></canvas>
      <div id="countdown" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:48px; color:white; display:none; pointer-events:none;">3</div>
      <div id="hud" role="status">
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="last-judgement">Last: —</div>
        <div id="accuracy">Accuracy: 100%</div>
        <div id="precision">Precision: 0 ms</div>
      </div>
    </div>

    <!-- Tutorial GIF (bottom-right under die) -->
    <img id="demo-gif" src="docs/demo.gif" alt="Pattern tutorial" class="demo-gif" visible />


    <!-- Modals -->
    <div id="login-modal" class="modal" hidden>
      <div class="modal-content">
        <h2>Log in</h2>
        <form id="login-form" novalidate>
          <label for="username">Username</label>
          <input id="username" placeholder="Username" aria-label="Username" />
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" aria-label="Password" autocomplete="current-password" />
          <div class="modal-buttons">
            <button id="login-submit-btn" type="button">Log in</button>
            <button id="login-cancel-btn" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div id="settings-modal" class="modal" hidden>
      <div class="modal-content">
        <h2>Settings</h2>
        <div id="keybind-panel">
          <h3>Keybinds</h3>
          <div class="keybind-row">
            <label for="bind-a">A</label>
            <input id="bind-a" maxlength="5" placeholder="A" />
          </div>
          <div class="keybind-row">
            <label for="bind-s">S</label>
            <input id="bind-s" maxlength="5" placeholder="S" />
          </div>
          <div class="keybind-row">
            <label for="bind-d">D</label>
            <input id="bind-d" maxlength="5" placeholder="D" />
          </div>
          <div class="keybind-row">
            <label for="bind-f">F</label>
            <input id="bind-f" maxlength="5" placeholder="F" />
          </div>
        </div>
        <div id="account-panel" hidden>
          <h3>Account Options</h3>
          <button id="logout-btn">Log Out</button>
          <button id="reset-stats-btn">Reset All Stats</button>
          <button id="reset-beat-btn">Reset Beat Mode Stats</button>
          <button id="reset-key-btn">Reset Key Mode Stats</button>
          <button id="reset-pattern-btn">Reset Pattern Mode Stats</button>
          <button id="delete-account-btn">Delete Account</button>
        </div>
        <div class="modal-buttons">
          <button id="save-settings-btn">Save</button>
          <button id="cancel-settings-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="profile-modal" class="modal" hidden>
      <div class="modal-content">
        <h2>Profile: <span id="profile-username"></span></h2>
        <div id="profile-stats">
          <div class="stat-item">
            <strong>Overall Best Score:</strong> <span id="overall-best"></span>
          </div>
          <div class="stat-item">
            <strong>Total Plays:</strong> <span id="total-plays"></span>
          </div>
          <h3>Mode Statistics</h3>
          <div id="mode-stats">
            <!-- Will be populated by JS -->
          </div>
        </div>
        <div class="modal-buttons">
          <button id="close-profile-btn">Close</button>
        </div>
      </div>
    </div>

    <div id="signup-modal" class="modal" hidden>
      <div class="modal-content">
        <h2>Sign Up</h2>
        <form id="signup-form" novalidate>
          <label for="signup-username">Username</label>
          <input id="signup-username" placeholder="Username (3-16 chars, letters, numbers, -, _)" aria-label="Username" />
          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" placeholder="Password (min 8 chars, include upper, lower, number, special)" aria-label="Password" autocomplete="new-password" />
          <label for="signup-confirm-password">Confirm Password</label>
          <input id="signup-confirm-password" type="password" placeholder="Confirm Password" aria-label="Confirm Password" autocomplete="new-password" />
          <div class="modal-buttons">
            <button id="signup-submit-btn" type="button">Sign Up</button>
            <button id="signup-cancel-btn" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
