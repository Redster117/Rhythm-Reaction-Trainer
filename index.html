<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rhythm Reaction Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header><h1>Rhythm Reaction Trainer</h1></header>

    <section id="controls">
      <div id="mode-select">
        <button id="btn-beat">Beat-Click Trainer</button>
      </div>
      <div id="profile">
        <input id="username" placeholder="Username" />
        <button id="start-btn">Start</button>
      </div>
    </section>

    <canvas id="game-canvas" width="800" height="500" aria-label="Game canvas"></canvas>

    <div id="hud" role="status">
      <div id="score">Score: 0</div>
      <div id="combo">Combo: 0</div>
      <div id="last-judgement">Last: —</div>
    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
